<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#09090b"/>

  <!-- Film body -->
  <rect x="3" y="7" width="26" height="18" rx="3.5" fill="white"/>

  <!-- Left perforation strip -->
  <rect x="3" y="7" width="8" height="18" rx="3.5" fill="#d4d4d8"/>
  <rect x="7.5" y="7" width="3.5" height="18" fill="#d4d4d8"/>

  <!-- Right perforation strip -->
  <rect x="21" y="7" width="8" height="18" rx="3.5" fill="#d4d4d8"/>
  <rect x="21" y="7" width="3.5" height="18" fill="#d4d4d8"/>

  <!-- Left holes -->
  <rect x="4" y="10.5" width="6" height="4" rx="1.2" fill="white"/>
  <rect x="4" y="17.5" width="6" height="4" rx="1.2" fill="white"/>

  <!-- Right holes -->
  <rect x="22" y="10.5" width="6" height="4" rx="1.2" fill="white"/>
  <rect x="22" y="17.5" width="6" height="4" rx="1.2" fill="white"/>
</svg>
