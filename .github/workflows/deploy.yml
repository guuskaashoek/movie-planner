name: Deploy to GuusLab Jet

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    # Use native ARM64 runner instead of x86 with QEMU emulation!
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/guuskaashoek/jet-project-movie-planner:latest
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger GuusLab Jet Deployment
        run: |
          curl -X POST -H "Content-Type: application/json" -d '{"projectId":"movie-planner","token":"d3c8f527f0bf8e42c3f324f76abac1fd3b2e32901646ddf068560205fcacdbc7"}' https://jet.guuslab.com/webhook/gh-action-deploy
